<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediMitra | Login</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
  body {
  background: linear-gradient(135deg, #e8f5e9, #fffde7);
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

    .login-card {
      background: white;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      width: 90%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .login-card h2 {
      margin-bottom: 1.5rem;
      color: #2e4935;
    }

    .login-card input {
      width: 100%;
      padding: 0.9rem;
      margin-bottom: 1rem;
      border: 1px solid #cfd8dc;
      border-radius: 12px;
      font-size: 1rem;
      background-color: #f8fafb;
    }

    .login-card button {
      width: 100%;
      padding: 0.9rem;
      background-color: #81c784;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .login-card button:hover {
      background-color: #66bb6a;
    }

    .login-card p {
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .login-card a {
      color: #558b2f;
      text-decoration: none;
    }

    .login-card a:hover {
      text-decoration: underline;
    }

    /* Dark mode support */
    body.dark {
      background: linear-gradient(135deg, #1e2d25, #2f3c30);
    }

    body.dark .login-card {
      background: #2b3b32;
      color: #e0f2e9;
    }

    body.dark .login-card input {
      background-color: #374940;
      border: 1px solid #4e6357;
      color: #f0f9f5;
    }

    body.dark .login-card button {
      background-color: #aed581;
      color: #1b2a1e;
    }

    body.dark .login-card button:hover {
      background-color: #c5e1a5;
    }

    body.dark .login-card a {
      color: #c8e6c9;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>Login to MediMitra</h2>
    <form>
      <input type="email" placeholder="Email Address" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p><a href="#">Forgot password?</a></p>
    <p>New here? <a href="register.html">Create an account</a></p>

  </div>

  <!-- Dark Mode Toggle -->
  <button id="theme-toggle" aria-label="Toggle Dark Mode" style="position: fixed; top: 1rem; right: 1rem; font-size: 1.5rem;">🌙</button>

  <script>
    const toggle = document.getElementById("theme-toggle");
    toggle.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      toggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    });
  </script>
</body>
</html>
